version: "3.9"

services:
  web:
    build: .
    container_name: social_scope_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
  
  db:
    image: postgres:15
    container_name: social_scope_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  worker:
    build: .
    container_name: social_scope_worker
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
    - PYTHONPATH=/app
    command: celery -A celery_app.celery_app worker --loglevel=info --pool=solo
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: social_scope_redis
    ports:
      - "6379:6379"


volumes:
  pgdata: